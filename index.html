function nutritionTargets(weight, rate) {
  // rate in kg/week bepaalt surplus. ~7700 kcal per kg, ~60% via voeding effectief
  const maintenance = Math.round(weight * 45); // hoog actief: 10+ sessies/wk
  const surplus = Math.round((rate || 0.4) * 7700 / 7); // dagelijks surplus
  const calories = Math.max(3600, maintenance + surplus); // minimum 3600 kcal (Defensie-advies)
  const protein = Math.round(weight * 2.0); // g
  const fat = Math.round(calories * 0.25 / 9);
  const carbs = Math.round((calories - protein * 4 - fat * 9) / 4);
  return {
    maintenance,
    calories,
    protein,
    fat,
    carbs,
    surplus
  };
}

    try {

      for (const k of keys) {

            if (k === "logs") setLogs(v);
